name: "org-repo-checks"

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  security-events: write


jobs:
  reposaur_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Check repo contents
        run: ls -a

      - name: Execute Policies
        uses: reposaur/repo-audit-action@v0.1.0
        with:
          policy: "./policies/"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Output reposaur results
        run: ls -a .reposaur

