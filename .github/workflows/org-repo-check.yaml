name: "org-repo-checks"

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  audit_github_org:
    name: Run GitHub organization audit
    runs-on: ubuntu-latest
    steps:
      - name: Get Repo List
        id: repo
        uses: yi-Xu-0100/repo-list-generator@v1.0.1
        with:
          my_token: ${{ github.token }}
          user: "catenax-ng"

      - name: Echo Output
        run: |
          echo repoList: ${{steps.repo.outputs.repoList}}
          echo repoList_ALL: ${{steps.repo.outputs.repoList_ALL}}

      - name: Create job summary
        uses: actions/github-script@v6
        with:
          script: |
            const readmeExists = async (repo) => {
              try {
                const response = await github.rest.repos.getContent(
                  {
                    owner: "catenax-ng",
                    repo: repo,
                    path: "README.md"
                  }
                );
                console.log("Checking README.md exists on " + repo + ". status: " + response.status);
                return response.status === 200;
              } catch (e) {
                console.log("error while checking repo: " + repo)
                return false
              }
            };

            const summary = core.summary;
            summary.addHeading('Repository checks on catenax-ng (public only)')

            const repositories = "${{steps.repo.outputs.repoList_ALL}}".split(',');

            const repoTableLines = repositories.map(repo => [
              repo,
              readmeExists(repo) ? ':white_check_mark:' : ':x:',
              'N/A',
              'N/A'
            ]);

            summary.addTable([
                [
                  {data: 'Repository nane', header: true},
                  {data: 'Has README.md', header: true},
                  {data: 'Has NOTICE.md', header: true},
                  {data: 'Has SECURITY.md', header: true}
                ],
                ...repoTableLines
              ])
              .addLink('Information on FOSS files!', 'https://github.com/catenax-ng/foss-example#files-from-directory-catenax-ng-repositories')
              .write();
